# Opt-in local hooks. Enable with: .venv/bin/pre-commit install
# Hooks call the venv ruff so the version always matches requirements.txt.
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: .venv/bin/ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff format
        entry: .venv/bin/ruff format
        language: system
        types: [python]
