import_history:
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: engie_be
          multiple: true
    fuel:
      required: false
      selector:
        select:
          multiple: true
          translation_key: fuel
          options:
            - "consumption"
            - "injection"
            - "gas"
    start_date:
      required: false
      example: "2024-01-01"
      selector:
        date:
    end_date:
      required: false
      example: "2024-06-30"
      selector:
        date:

clear_import_history:
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: engie_be
          multiple: true
    fuel:
      required: false
      selector:
        select:
          multiple: true
          translation_key: fuel
          options:
            - "consumption"
            - "injection"
            - "gas"
