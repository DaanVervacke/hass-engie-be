blueprint:
  name: ENGIE Belgium - Daily historical data sync
  description: >
    Runs `engie_be.import_history` once a day. Useful if you don't have
    a P1 meter and want to keep your Energy dashboard up-to-date with
    the latest data from ENGIE. Only fetches new data (since the
    previous run). Set up once per business-agreement device. For a
    one-off run, click "Run actions" on the automation in Settings >
    Automations & scenes.
  domain: automation
  source_url: https://github.com/DaanVervacke/hass-engie-be/blob/feat/import-historical-energy-data/blueprints/automation/DaanVervacke/engie_be_daily_history_sync.yaml
  input:
    engie_device:
      name: ENGIE business agreement
      description: The device to sync data from.
      selector:
        device:
          filter:
            - integration: engie_be
    sync_time:
      name: When to sync
      description: When the automation should fetch the new data.
      default: "04:00:00"
      selector:
        time:
    energy_type:
      name: Energy type
      description: >
        Which energy type to sync. Leave all selected to sync everything the
        account provides.
      default:
        - consumption
        - injection
        - gas
      selector:
        select:
          multiple: true
          options:
            - value: consumption
              label: Electricity consumption
            - value: injection
              label: Electricity injection
            - value: gas
              label: Gas consumption
    include_costs:
      name: Include costs
      description: Also import the per-hour cost (EUR).
      default: false
      selector:
        boolean:

mode: single
max_exceeded: silent

triggers:
  - trigger: time
    at: !input sync_time

actions:
  - action: engie_be.import_history
    target:
      device_id: !input engie_device
    data:
      energy_type: !input energy_type
      include_costs: !input include_costs
