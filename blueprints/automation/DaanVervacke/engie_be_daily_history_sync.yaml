blueprint:
  name: ENGIE Belgium - Daily historical data sync
  description: >
    Runs `engie_be.import_history` once a day. Useful if you don't have
    a P1 meter and want the Energy Dashboard to keep receiving data from
    ENGIE. Only fetches new hours since the last run. Set up once per
    business-agreement device. For a one-off run, click "Run actions" on
    the automation in Settings > Automations & Scenes.
  domain: automation
  source_url: https://github.com/DaanVervacke/hass-engie-be/blob/main/blueprints/automation/DaanVervacke/engie_be_daily_history_sync.yaml
  input:
    engie_device:
      name: ENGIE business agreement
      description: The device representing the ENGIE business agreement to sync.
      selector:
        device:
          filter:
            - integration: engie_be
    sync_time:
      name: Time of day to sync
      description: When to run the sync each day.
      default: "04:00:00"
      selector:
        time:
    energy_type:
      name: Energy type
      description: >
        Which energy type to sync. Leave all selected to sync everything the
        account provides.
      default:
        - consumption
        - injection
        - gas
      selector:
        select:
          multiple: true
          options:
            - value: consumption
              label: Electricity consumption
            - value: injection
              label: Electricity injection
            - value: gas
              label: Gas consumption
    include_costs:
      name: Include costs
      description: >
        Also import per-hour cost (EUR) alongside the kWh streams. Off by
        default.
      default: false
      selector:
        boolean:

mode: single
max_exceeded: silent

trigger:
  - platform: time
    at: !input sync_time

action:
  - service: engie_be.import_history
    target:
      device_id: !input engie_device
    data:
      energy_type: !input energy_type
      include_costs: !input include_costs
